<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button>Click</button>
    <p id="result"></p>
<script> src="js/config.js"></script>
    <script>
      const btn = document.querySelector("button");
      const result = document.querySelector("#result");

      async function getRandomword() {
        const response = await fetch("https://oim.108122.xyz/words/random");
        const word = await response.json();
        console.log(word); // a random word!
        result.textContent = word;
      }

      async function showTowns() {
        const response = await fetch("https://oim.108122.xyz/mass", {
          headers: { "X-token": "OIM_TOKEN" },
        });

        async function postMessage(text) {
          const response = await fetch("https://oim.108122.xyz/message", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Token": "OIM_TOKEN", // your first name x2
            },
            body: JSON.stringify({ message: text }),
          });
          const result = await response.json();
          console.log(result);
        }

        postMessage("Hello from Zander!");

        const data = await response.json();

        console.log(data.name); // 'Massachusetts'
        console.log(data.governor); // 'Maura Healey'

        for (const town of data.data) {
          result.innerHTML += `<p>${town.name} - Population: ${town.population}</p>`;
        }
      }

      btn.addEventListener("click", getRandomword);
      showTowns();
    </script>
  </body>
</html>
