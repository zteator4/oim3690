<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="get-word-btn">Get Random Word</button>
    <p id="result"></p>

    <button id="get-five-btn">Get 5 Random Words</button>
    <ul id="word-list"></ul>

    <script>
      const btn = document.getElementById("get-word-btn");
      const result = document.getElementById("result");
      const fiveBtn = document.getElementById("get-five-btn");
      const list = document.getElementById("word-list");

      btn.addEventListener("click", async () => {
        result.textContent = "loading...";
        try {
          const response = await fetch("https://oim.108122.xyz/words/random");
          if (!response.ok) throw new Error("Failed to fetch");
          const word = await response.json();
          result.textContent = word;
        } catch (error) {
          result.textContent = "Error: " + error.message;
        }
      });

      fiveBtn.addEventListener("click", async () => {
        list.innerHTML = "<li>loading...</li>";
        try {
          const words = [];
          for (let i = 0; i < 5; i++) {
            const response = await fetch("https://oim.108122.xyz/words/random");
            if (!response.ok) throw new Error("Failed to fetch");
            const word = await response.json();
            words.push(word);
          }
          list.innerHTML = words.map((w) => `<li>${w}</li>`).join("");
        } catch (error) {
          list.innerHTML = "<li>Error: " + error.message + "</li>";
        }
      });
    </script>
  </body>
</html>
