<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="messages"></div>
    <input type="text" id="new-message" placeholder="Enter message" />
    <button id="post-btn">Post Message</button>

    <script>
      async function loadMessages() {
        try {
          const response = await fetch("https://oim.108122.xyz/messages");
          const messages = await response.json();
          displayMessages(messages);
        } catch (error) {
          document.getElementById("messages").textContent =
            "Error loading messages";
        }
      }

      function displayMessages(messages) {
        const div = document.getElementById("messages");
        div.innerHTML = messages.map((m) => `<p>${m.text || m.message || m.content || m.body || m}</p>`).join("");
      }

      document
        .getElementById("post-btn")
        .addEventListener("click", async () => {
          const input = document.getElementById("new-message");
          const message = input.value.trim();
          if (!message) return;
          try {
            const response = await fetch("https://oim.108122.xyz/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-Token": "zanderzander",
              },
              body: JSON.stringify({ message: message }),
            });
            if (response.ok) {
              input.value = "";
              loadMessages();
            } else {
              alert("Failed to post message");
            }
          } catch (error) {
            alert("Error posting message");
          }
        });

      loadMessages();
    </script>
  </body>
</html>
