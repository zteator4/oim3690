<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="/css/todo.css">
</head>
<body>
    <h1>To-Do List</h1>
    <section class="global-lists">
        <h2>Global Lists</h2>
        <div class="add-global-section">
            <input type="text" id="global-section-title" placeholder="Enter list title...">
            <button id="add-global-section-btn">Add List</button>
        </div>
        <div id="global-sections-container"></div>
    </section>
    <section class="daily-lists">
        <h2>Daily Lists</h2>
        <div id="add-day" style="text-align: center; margin-bottom: 30px;">
            <button id="add-day-btn">Add New Day</button>
        </div>
        <div id="days-container"></div>
    </section>

    <script src="js/todo.js"></script>
</body>
</html>
